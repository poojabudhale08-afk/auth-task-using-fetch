<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
      crossorigin="anonymous"
    />

    <title>Hello, world!</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <div class="authWrapper">
      <div class="card authCard">
        <div class="card-body">
             <nav>
            <div class="nav nav-tabs" id="nav-tab" role="tablist">
              <button
                class="nav-link "
                id="nav-home-tab"
                data-toggle="tab"
                data-target="#loginTab"
                type="button"
                role="tab"
                aria-controls="nav-home"
                aria-selected="true"
              >
                Login
              </button>
              <button
                class="nav-link active"
                id="nav-profile-tab"
                data-toggle="tab"
                data-target="#signUpTab"
                type="button"
                role="tab"
                aria-controls="nav-profile"
                aria-selected="false"
              >
                Sign up
              </button>
            </div>
          </nav>
          <div class="tab-content" id="nav-tabContent">
            <div
              class="tab-pane fade  "
              id="loginTab"
              role="tabpanel"
              aria-labelledby="nav-home-tab"
            >
              Login Form
            </div>
            <div
              class="tab-pane fade show active"
              id="signUpTab"
              role="tabpanel"
              aria-labelledby="nav-profile-tab"
            >
              <form id="signUpForm">
                <div class="form-group">
                    <label for="signUpemail">Email</label>
                    <input type="text" class="form-control" id="signUpemail">
                </div>
                 <div class="form-group">
                    <label for="signUppassword">Password</label>
                    <input type="password" class="form-control" id="signUppassword">
                </div>
                <div class="form-group">
                    <label for="signUpuserRole">UserRole</label>
                    <select id="signUpuserRole" class="form-control">
                        <option value="admin">Admin</option>
                        <option value="buyer">Buyer</option>
                        <option value="super admin">Super Admin</option>
                    </select>
                </div>
                <div class="btn btn-block btn-sm btn-outline-primary">Sign Up</div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
      integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
      crossorigin="anonymous"
    ></script>

    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
    -->

    <script src="./assets/js/app.js"></script>
    <script src="./assets/js/auth.js"></script>
  </body>
</html>
